# Production Configuration for PCI Dashboard

[app]
title = PCI Dashboard - Pharmaceutical Competitive Intelligence
icon = 💊
layout = wide
initial_sidebar_state = expanded

[theme]
primaryColor = #667eea
backgroundColor = #f5f7fa
secondaryBackgroundColor = #ffffff
textColor = #1a365d
font = sans serif

[client]
showErrorDetails = false
toolbarMode = minimal
maxUploadSize = 200

[logger]
level = info
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s

[security]
enableXssfProtection = true
enableCsrfProtection = true
enableCors = true
corsAllowedOrigins = ["*"]
sessionTimeout = 3600
passwordMinLength = 8
passwordRequireSpecialChars = true
passwordRequireNumbers = true

[performance]
cacheDataTTL = 3600
maxConcurrentUsers = 100
enableCompressionGzip = true
enableMinifyAssets = true
enableLazyLoading = true

[database]
connectionPoolSize = 10
queryTimeout = 30
enableConnectionRetry = true
maxRetries = 3

[api]
requestTimeout = 30
enableRateLimiting = true
rateLimit = 1000
rateLimitWindow = 3600

[monitoring]
enableMetrics = true
enableLogging = true
enableErrorTracking = true
enablePerformanceMonitoring = true

[export]
maxExportRows = 50000
supportedFormats = ["csv", "xlsx", "pdf"]
enableEncryption = true

[ui]
animationDuration = 300
transitionTiming = cubic-bezier(0.4, 0, 0.2, 1)
borderRadius = 10px
shadowElevation = 8px
